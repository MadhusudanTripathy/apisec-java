apiwiz.tenant=stage-data
apiwiz.x-apikey=

scanner.mode=safe
scanner.timeoutSeconds=10
scanner.maxRequestsPerRule=3
scanner.redactSecrets=true
scanner.allowDangerous=false

rules.directory=./rules
rules.pull.enabled=true
rules.pull.sourceUrl=https://dev-api.apiwiz.io/itorix/v2/api-security/cli/pull/rule-group
rules.pull.tokenEnv=APISEC_RULES_TOKEN

reports.directory=./reports
reports.fileNamePattern=scan_{timestamp}_{scanId}.json
reports.redactSecrets=false

webhook.enabled=true
webhook.url=https://dev-api.apiwiz.io/itorix/v2/api-security/cli/webhook
webhook.timeoutSeconds=5
webhook.retries=3
webhook.endpointReportRetention=20

application.scan.sourceUrl=https://dev-api.apiwiz.io/itorix/v2/api-security/application


openai.enabled=true
openai.baseUrl=https://api.openai.com/v1/chat/completions

openai.apiKey=

openai.model=gpt-4o-mini
openai.timeoutSeconds=20
openai.maxFindings=10
openai.temperature=0.2
openai.includeRawEvidence=true
openai.failOpen=true
APISEC_FORCE_INTERACTIVE=true
